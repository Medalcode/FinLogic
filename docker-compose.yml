version: "3.8"

services:
  # Servicio Principal: API y Lógica de Negocio
  cashflow:
    build:
      context: ./services/cashflow
    ports:
      - "8001:8001"
    environment:
      - API_KEY=dev-key
      # La API lee de DuckDB, pero también escribirá RAW files aquí
      - DATA_RAW_DIR=/data/raw
      - DATA_WAREHOUSE_DIR=/data/warehouse
      - DATA_FILE=/data/warehouse/market.duckdb
      - USE_DUCKDB=1
    volumes:
      # Volumen compartido para persistencia de archivos
      - ./data/raw:/data/raw
      - ./data/warehouse:/data/warehouse

  # Servicio Secundario: ETL y Tareas Batch
  etl-runner:
    build:
      context: ./platform/etl
    environment:
      - ETL_INTERVAL=15
      - RAW_DIR=/data/raw
      - DB_FILE=/data/warehouse/market.duckdb
    volumes:
      # Misma vista del sistema de archivos que la API
      - ./data/raw:/data/raw
      - ./data/warehouse:/data/warehouse
